<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Visualize pending Ethereum transactions as a force-directed graph.">
    <meta name="author" content="Shawn Tabrizi">

    <title>ETH Transaction Graph</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        .sidebar {
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #graph svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Desktop: sidebar left, graph right */
        @media (min-width: 768px) {
            .app {
                display: flex;
                height: 100vh;
            }
            .sidebar {
                width: 300px;
                flex-shrink: 0;
                height: 100vh;
                overflow-y: auto;
            }
            .graph-area {
                flex: 1;
                height: 100vh;
            }
        }
        /* Mobile: stack vertically */
        @media (max-width: 767px) {
            .sidebar {
                border-right: none;
                border-bottom: 1px solid #dee2e6;
            }
            .graph-area {
                height: calc(100vh - 200px);
            }
        }
        .footer {
            font-size: 0.8rem;
            color: #6c757d;
        }
        .footer a {
            color: #6c757d;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="sidebar">
            <div>
                <h4>ETH Transaction Graph</h4>
                <p class="text-muted">Visualize pending transactions on Ethereum in real time.</p>
                <div class="d-flex gap-2 mb-3">
                    <a class="btn btn-success" onclick="start();" role="button">Start</a>
                    <a class="btn btn-secondary" onclick="stop();" role="button">Stop</a>
                </div>
                <hr />
                <div id="output" class="small" style="word-break: break-all;">Press start, then click a node to see its address.</div>
            </div>
            <div class="footer mt-3">
                Created by <a href="https://shawntabrizi.com">Shawn Tabrizi</a> &middot;
                <a href="https://github.com/shawntabrizi/ETH-Transaction-Graph">GitHub</a> &middot;
                <a href="https://d3js.org/">D3.js</a> &middot;
                <a href="https://docs.ethers.org/">ethers.js</a>
            </div>
        </div>
        <div class="graph-area" id="graph"></div>
    </div>

    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
    <script src="./ethtransactiongraph.js"></script>
</body>
</html>
